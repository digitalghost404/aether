# Aether Configuration
# Copy to ~/.config/aether/config.yaml and edit

location:
  latitude: null        # Required — your latitude for sunrise/sunset
  longitude: null       # Required — your longitude for sunrise/sunset

presence:
  camera_index: 0                # /dev/video index
  absence_timeout_sec: 10        # Seconds with no human before AWAY
  detection_confidence: 0.5      # MediaPipe min detection confidence (0.0-1.0)
  frame_interval_ms: 100         # ~10fps — responsive gestures at ~6% CPU

mqtt:
  broker: localhost
  port: 1883
  topic_prefix: aether

circadian:
  update_interval_sec: 30        # Steady-state tick rate (seconds)
  ramp_interval_ms: 100          # Tick rate during ramps (10/sec)
  return_ramp_sec: 8             # Compressed sunrise duration on return
  sunrise_offset_min: 0          # Shift sunrise ± minutes
  sunset_offset_min: 0           # Shift sunset ± minutes
  palettes:
    dawn:
      color: [255, 160, 50]
      brightness: 30
    morning:
      color: [255, 240, 220]
      brightness: 80
    midday:
      color: [255, 255, 255]
      brightness: 100
    golden_hour:
      color: [255, 180, 60]
      brightness: 70
    evening:
      color: [80, 60, 180]
      brightness: 40
    night:
      color: [30, 20, 80]
      brightness: 15
    nightlight:
      color: [180, 140, 60]
      brightness: 5

zones:
  wall_left:
    govee_device: null
  wall_right:
    govee_device: null
  monitor:
    govee_device: null
  floor:
    govee_device: null
  bedroom:
    govee_device: null
  # desk:                              # OpenRGB peripherals (requires openrgb-python + OpenRGB server)
  #   openrgb_devices:
  #     - "SteelSeries Apex 3 TKL"    # Run `openrgb --list-devices` for exact names
  #     - "SteelSeries Rival 600"
  # tower:
  #   openrgb_devices:
  #     - "Corsair Lighting Node"
  #     - "XPG RAM"

alerts:
  sentry:
    floor_flash_color: [255, 180, 0]
    floor_flash_count: 3

focus:
  work_min: 25
  short_break_min: 5
  long_break_min: 15
  cycles: 4                          # 0 = indefinite
  work_color: [255, 255, 255]        # cool white for monitor
  work_brightness: 100
  rope_dim_brightness: 10
  break_color: [180, 230, 180]       # green-warm for breaks
  break_brightness: 10
  desk_color: [255, 223, 191]        # warm white ~4000K for keyboard/mouse
  desk_brightness: 80
  tower_brightness: 10               # dim case/RAM during focus

party:
  accent_zone: floor                 # which light pulses on beats
  accent_brightness_low: 40
  accent_brightness_high: 100
  base_shift_beats: 8                # color change every N beats
  silence_timeout_sec: 120
  tower_beat_sync: true              # tower (case/RAM) pulses with beats
  desk_accent: true                  # desk follows base accent color
  palette:
    - [180, 50, 255]                 # purple
    - [255, 50, 150]                 # magenta
    - [50, 220, 220]                 # teal
    - [255, 80, 50]                  # hot orange

sleep:
  total_duration_min: 5
  bedroom_final_color: [200, 100, 30]
  bedroom_final_brightness: 5

mixer:
  manual_ttl_sec: 600          # 10 min default for voice/gesture overrides
  tick_interval_sec: 1         # claim expiry check rate

vox:
  enabled: true
  mic_source: "alsa_input.usb-Clip-on_USB_microphone_UM02-00.mono-fallback"
  wake_word: "hey_jarvis"
  command_timeout_sec: 5
  silence_timeout_sec: 1.5
  whisper_model: "small"
  ollama_model: "qwen3.5:4b"
  feedback_flash: true

gestures:
  enabled: true
  detection_confidence: 0.5
  consecutive_frames: 3
  fist_hold_frames: 9
  cooldown_sec: 5
  feedback_flash: true

# OpenRGB desk peripherals (optional — requires `pip install openrgb-python` and OpenRGB server)
openrgb:
  enabled: false                     # set to true after running `openrgb --list-devices`
  host: localhost
  port: 6742
