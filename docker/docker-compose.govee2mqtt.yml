services:
  govee2mqtt:
    image: ghcr.io/wez/govee2mqtt:latest
    container_name: govee2mqtt
    restart: unless-stopped
    network_mode: host
    environment:
      - GOVEE_API_KEY=${GOVEE_API_KEY}
      - GOVEE_MQTT_HOST=127.0.0.1
      - GOVEE_MQTT_PORT=1883
    volumes:
      - govee2mqtt-data:/data

volumes:
  govee2mqtt-data:
